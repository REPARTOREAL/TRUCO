<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUTRUCON 🃏</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1e2730;--border:#30363d;
  --green:#3fb950;--red:#f85149;--yellow:#d29922;--blue:#58a6ff;
  --purple:#bc8cff;--orange:#ff7b72;--text:#e6edf3;--muted:#8b949e;
  --cardA:#f0e6c8;--cardB:#1a1a2e;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* LOBBY */
#lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem;gap:1.5rem;}
.logo{font-size:3rem;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#f0c040,#ff7b72);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;}
.logo small{display:block;font-size:1rem;letter-spacing:4px;font-weight:400;-webkit-text-fill-color:var(--muted);}
.card-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:420px;display:flex;flex-direction:column;gap:1rem;}
.card-box h2{font-size:1.1rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:.5rem;}
label{font-size:.85rem;color:var(--muted);display:block;margin-bottom:.25rem;}
input,select{width:100%;padding:.6rem .8rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s;}
input:focus,select:focus{border-color:var(--blue);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;}
.toggle-row{display:flex;align-items:center;gap:.75rem;cursor:pointer;padding:.5rem 0;}
.toggle-row input[type=checkbox]{width:1.1rem;height:1.1rem;accent-color:var(--green);cursor:pointer;}
.toggle-row span{font-size:.95rem;}
.btn{padding:.7rem 1.4rem;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .15s;width:100%;}
.btn-go{background:linear-gradient(135deg,#238636,#3fb950);color:#fff;}
.btn-go:hover{filter:brightness(1.15);}
.btn-sec{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.btn-sec:hover{border-color:var(--blue);}
.join-code{font-size:2.5rem;letter-spacing:.5rem;font-weight:900;text-align:center;color:var(--yellow);font-family:monospace;}
.err{color:var(--red);font-size:.85rem;text-align:center;min-height:1.2rem;}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.4rem;}
.dot-green{background:var(--green);}
.dot-yellow{background:var(--yellow);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* SALA DE ESPERA */
#waiting-room{display:none;min-height:100vh;padding:2rem 1rem;display:none;flex-direction:column;align-items:center;gap:1.5rem;}
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;width:100%;max-width:600px;}
.player-slot{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;}
.player-slot.filled{border-color:var(--green);}
.player-slot.mine{border-color:var(--blue);}
.player-slot .avatar{font-size:2rem;}
.player-slot .pname{font-size:.9rem;font-weight:600;}
.player-slot .pteam{font-size:.75rem;padding:.2rem .5rem;border-radius:12px;font-weight:600;}
.team-a{background:#0d2137;color:var(--blue);}
.team-b{background:#2d1717;color:var(--orange);}
.slot-empty{color:var(--muted);font-size:.85rem;}

/* MESA DE JUEGO */
#game{display:none;height:100vh;overflow:hidden;flex-direction:column;}
.game-inner{flex:1;overflow-y:auto;padding:0 .5rem .5rem;}

/* HEADER */
.g-header{display:flex;align-items:center;gap:.5rem;padding:.5rem;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.g-scores{display:flex;gap:.75rem;font-size:.85rem;}
.score-team{display:flex;align-items:center;gap:.4rem;}
.score-bar{height:6px;border-radius:3px;background:var(--border);flex:1;min-width:60px;max-width:100px;}
.score-fill{height:100%;border-radius:3px;transition:width .4s;}
.fill-a{background:var(--blue);}
.fill-b{background:var(--orange);}
.g-info{flex:1;text-align:center;font-size:.8rem;color:var(--muted);}
.g-target{font-size:.75rem;color:var(--muted);}

/* TABLERO */
.board{display:grid;grid-template-rows:auto 1fr auto;gap:.5rem;padding:.5rem;min-height:calc(100vh - 120px);}

/* RIVALS */
.rivals-row{display:flex;justify-content:center;gap:.75rem;flex-wrap:wrap;}

/* BAJADA CENTRAL */
.center-zone{display:flex;flex-direction:column;align-items:center;gap:.5rem;}
.bazas-area{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;min-height:80px;align-items:center;}
.baza-pile{display:flex;align-items:center;justify-content:center;width:54px;height:80px;border-radius:6px;border:2px dashed var(--border);position:relative;font-size:.7rem;color:var(--muted);}
.played-card{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:6px;}
.status-banner{text-align:center;font-size:.9rem;font-weight:600;padding:.4rem 1rem;border-radius:20px;background:var(--bg3);border:1px solid var(--border);}

/* COMPAÑEROS */
.allies-row{display:flex;justify-content:center;gap:.75rem;flex-wrap:wrap;}

/* CARTAS */
.player-area{display:flex;flex-direction:column;align-items:center;gap:.4rem;min-width:90px;}
.player-area .pname-small{font-size:.7rem;color:var(--muted);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.player-area .hand{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;}

/* Carta visual */
.card{width:48px;height:72px;border-radius:6px;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;cursor:default;position:relative;transition:transform .15s,box-shadow .15s;user-select:none;flex-shrink:0;}
.card.playable{cursor:pointer;border-color:var(--green)!important;}
.card.playable:hover{transform:translateY(-8px);box-shadow:0 8px 20px rgba(63,185,80,.4);}
.card.suit-e{background:#fff8e8;border-color:#c8a84b;color:#7a4e00;}
.card.suit-b{background:#e8f4e8;border-color:#4a7c4a;color:#1a4a1a;}
.card.suit-o{background:#fff0d4;border-color:#d4860a;color:#7a4200;}
.card.suit-c{background:#f0e8f8;border-color:#8840c8;color:#4a1a7a;}
.card .crank{font-size:1.3rem;line-height:1;}
.card .csuit{font-size:.7rem;margin-top:1px;}
.card.face-down{background:var(--bg3);border-color:var(--border);background-image:repeating-linear-gradient(45deg,var(--bg2) 0,var(--bg2) 4px,var(--bg3) 4px,var(--bg3) 8px);cursor:default;}
.card.face-down .crank,.card.face-down .csuit{display:none;}
.card.ally-mini{width:36px;height:52px;font-size:.85rem;}
.card.ally-mini .crank{font-size:1rem;}
.card.ally-mini .csuit{font-size:.6rem;}
.card.played-on-table{width:38px;height:56px;font-size:.8rem;}
.card.played-on-table .crank{font-size:.95rem;}
.card.played-on-table .csuit{font-size:.55rem;}
.card.small-rival{width:32px;height:46px;font-size:.7rem;}
.card.small-rival .crank{font-size:.75rem;}

/* MANO DEL JUGADOR LOCAL */
.my-hand-row{display:flex;justify-content:center;gap:6px;padding:.5rem;flex-wrap:wrap;}
.my-hand-row .card{width:60px;height:90px;font-size:1.3rem;}
.my-hand-row .card .crank{font-size:1.6rem;}
.my-hand-row .card .csuit{font-size:.8rem;}

/* BOTONES DE ACCIÓN */
.actions-bar{padding:.5rem;display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;background:var(--bg2);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:99;}
.act-btn{padding:.45rem .85rem;border:none;border-radius:20px;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.act-btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
.act-btn.go{background:var(--green);color:#0d1117;}
.act-btn.yes{background:#0d3a1a;color:var(--green);border:1px solid var(--green);}
.act-btn.no{background:#3a0d0d;color:var(--red);border:1px solid var(--red);}
.act-btn.env{background:#1a1a3a;color:var(--blue);border:1px solid var(--blue);}
.act-btn.tru{background:#2d1a00;color:var(--yellow);border:1px solid var(--yellow);}
.act-btn.flor{background:#2d0d3a;color:var(--purple);border:1px solid var(--purple);}
.act-btn.mazo{background:var(--bg3);color:var(--muted);border:1px solid var(--border);}
.act-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}

/* CHAT */
.chat-panel{position:fixed;right:0;bottom:60px;width:280px;max-height:320px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius) 0 0 var(--radius);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s;z-index:200;}
.chat-panel.open{transform:translateX(0);}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;border-bottom:1px solid var(--border);font-size:.85rem;font-weight:600;}
.chat-msgs{flex:1;overflow-y:auto;padding:.5rem;display:flex;flex-direction:column;gap:.25rem;}
.chat-msg{font-size:.8rem;line-height:1.4;}
.chat-msg .cm-name{font-weight:700;color:var(--blue);}
.chat-msg .cm-text{color:var(--text);}
.chat-msg.sys{color:var(--muted);font-style:italic;}
.chat-form{display:flex;gap:.4rem;padding:.4rem;}
.chat-form input{flex:1;padding:.4rem .6rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.8rem;outline:none;}
.chat-form button{padding:.4rem .6rem;background:var(--blue);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:.8rem;}
.chat-toggle{position:fixed;right:.75rem;bottom:.75rem;width:48px;height:48px;border-radius:50%;background:var(--blue);border:none;color:#fff;font-size:1.3rem;cursor:pointer;z-index:201;display:none;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);}
.chat-badge{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;font-size:.6rem;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;display:none;}

/* LOG */
.game-log{max-height:110px;overflow-y:auto;padding:.4rem .5rem;background:var(--bg2);border-top:1px solid var(--border);font-size:.75rem;color:var(--muted);display:flex;flex-direction:column;gap:2px;}
.log-entry{padding:1px 0;}
.log-entry.highlight{color:var(--yellow);}

/* RESULTADO */
.win-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:300;display:none;}
.win-box{background:var(--bg2);border:2px solid var(--green);border-radius:var(--radius);padding:2.5rem 2rem;text-align:center;max-width:360px;display:flex;flex-direction:column;gap:1rem;}
.win-box h1{font-size:2rem;}
.win-box .scores-final{font-size:1.5rem;font-weight:700;color:var(--yellow);}

/* FOLD badge */
.fold-badge{font-size:.6rem;background:#5a1a1a;color:var(--red);border-radius:4px;padding:1px 4px;margin-left:2px;}

/* Indicador de turno */
.turn-indicator{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:pulse 1s infinite;}

/* RESPONSIVE */
@media(max-width:480px){
  .chat-panel{width:100%;border-radius:var(--radius) var(--radius) 0 0;right:0;bottom:56px;transform:translateY(100%);}
  .chat-panel.open{transform:translateY(0);}
  .card{width:44px;height:66px;}
  .my-hand-row .card{width:56px;height:84px;}
}
</style>
</head>
<body>

<!-- ===== LOBBY ===== -->
<div id="lobby">
  <div class="logo">TUTRUCON<small>TRUCO ARGENTINO</small></div>

  <!-- CREAR -->
  <div class="card-box" id="create-box">
    <h2>Crear mesa</h2>
    <div>
      <label>Tu nombre</label>
      <input id="cr-name" maxlength="16" placeholder="Nombre…">
    </div>
    <div>
      <label>Jugadores</label>
      <div class="row3">
        <button class="btn btn-sec players-btn active-choice" data-v="2">1 vs 1</button>
        <button class="btn btn-sec players-btn" data-v="4">2 vs 2</button>
        <button class="btn btn-sec players-btn" data-v="6">3 vs 3</button>
      </div>
    </div>
    <div class="row2">
      <div>
        <label>A cuántos puntos</label>
        <select id="cr-target">
          <option value="15">15 puntos</option>
          <option value="30" selected>30 puntos</option>
        </select>
      </div>
      <div>
        <label>Envido lo canta</label>
        <select id="cr-canta">
          <option value="any">Cualquiera</option>
          <option value="pie">Solo el pie</option>
        </select>
      </div>
    </div>
    <label class="toggle-row">
      <input type="checkbox" id="cr-flor" checked>
      <span>Jugar con flor 🌸</span>
    </label>
    <label class="toggle-row">
      <input type="checkbox" id="cr-chat" checked>
      <span>Chat de mesa 💬</span>
    </label>
    <div class="err" id="cr-err"></div>
    <button class="btn btn-go" id="cr-btn">Crear mesa</button>
    <button class="btn btn-sec" onclick="showJoin()">→ Unirme a una mesa</button>
  </div>

  <!-- UNIRSE -->
  <div class="card-box" id="join-box" style="display:none">
    <h2>Unirse a mesa</h2>
    <div>
      <label>Tu nombre</label>
      <input id="jo-name" maxlength="16" placeholder="Nombre…">
    </div>
    <div>
      <label>Código de mesa</label>
      <input id="jo-code" maxlength="8" placeholder="XXXX" style="text-transform:uppercase;letter-spacing:4px;font-size:1.3rem;font-weight:700;text-align:center;">
    </div>
    <div class="err" id="jo-err"></div>
    <button class="btn btn-go" id="jo-btn">Unirme</button>
    <button class="btn btn-sec" onclick="showCreate()">← Volver a crear</button>
  </div>
</div>

<!-- ===== SALA DE ESPERA ===== -->
<div id="waiting-room" style="display:none">
  <div class="logo" style="font-size:2rem">Sala de espera</div>
  <div>
    <div style="text-align:center;margin-bottom:.5rem;color:var(--muted);font-size:.9rem;">Código de mesa — compartí este código con tus amigos</div>
    <div class="join-code" id="room-code">----</div>
  </div>
  <div id="wr-config" style="font-size:.85rem;color:var(--muted);text-align:center;"></div>
  <div class="players-grid" id="wr-players"></div>
  <div class="err" id="wr-err"></div>
  <button class="btn btn-go" id="start-btn" style="max-width:300px;display:none">▶ ¡Empezar partida!</button>
  <div id="wr-waiting-msg" style="color:var(--muted);font-size:.9rem;text-align:center;"></div>
  <button class="btn btn-sec" style="max-width:300px" onclick="leaveRoom()">Salir de la mesa</button>
</div>

<!-- ===== MESA DE JUEGO ===== -->
<div id="game" style="display:none">
  <div class="g-header">
    <div class="g-scores">
      <div class="score-team">
        <span id="score-a-name" style="color:var(--blue);font-weight:700"></span>&nbsp;
        <span id="score-a-val" style="font-weight:700;color:var(--blue)">0</span>
        <div class="score-bar"><div class="score-fill fill-a" id="bar-a" style="width:0%"></div></div>
      </div>
      <div class="g-target" id="g-target-lbl"></div>
      <div class="score-team">
        <div class="score-bar"><div class="score-fill fill-b" id="bar-b" style="width:0%"></div></div>
        <span id="score-b-val" style="font-weight:700;color:var(--orange)">0</span>&nbsp;
        <span id="score-b-name" style="color:var(--orange);font-weight:700"></span>
      </div>
    </div>
    <div class="g-info" id="g-hand-info"></div>
  </div>

  <div class="game-inner">
    <div class="board">
      <!-- RIVALES -->
      <div class="rivals-row" id="rivals-row"></div>

      <!-- ZONA CENTRAL -->
      <div class="center-zone">
        <div class="status-banner" id="status-banner">—</div>
        <div class="bazas-area" id="bazas-area"></div>
        <!-- Compañeros con sus cartas -->
        <div class="allies-row" id="allies-row"></div>
      </div>

      <!-- MI MANO -->
      <div>
        <div style="text-align:center;font-size:.8rem;color:var(--muted);margin-bottom:.3rem" id="my-label">Tu mano</div>
        <div class="my-hand-row" id="my-hand"></div>
      </div>
    </div>

    <!-- LOG -->
    <div class="game-log" id="game-log"></div>
  </div>

  <!-- ACCIONES -->
  <div class="actions-bar" id="actions-bar"></div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="win-overlay">
  <div class="win-box">
    <div id="win-icon" style="font-size:3rem">🏆</div>
    <h1 id="win-title">¡Ganaron!</h1>
    <div class="scores-final" id="win-scores"></div>
    <button class="btn btn-go" onclick="doReset()">REVANCHA</button>
    <button class="btn btn-sec" onclick="leaveRoom()">Salir</button>
  </div>
</div>

<!-- CHAT -->
<button class="chat-toggle" id="chat-toggle" onclick="toggleChat()">
  💬<span class="chat-badge" id="chat-badge">0</span>
</button>
<div class="chat-panel" id="chat-panel">
  <div class="chat-header">
    <span>Chat 💬</span>
    <div style="display:flex;align-items:center;gap:.5rem">
      <span id="chat-lock-icon" style="font-size:1rem"></span>
      <button onclick="toggleChat()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem">✕</button>
    </div>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-form" id="chat-form">
    <input id="chat-input" placeholder="Mensaje…" maxlength="80" onkeydown="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()">↑</button>
  </div>
</div>

<!-- ===== ENGINE ===== -->
<script>
(function(){
'use strict';
var SUITS = ['e', 'b', 'o', 'c'];
var RANKS = [1, 2, 3, 4, 5, 6, 7, 10, 11, 12];
var SUIT_NAME = { e: 'espada', b: 'basto', o: 'oro', c: 'copa' };
var SUIT_SYM = { e: '⚔️', b: '🪵', o: '🪙', c: '🏆' };
function makeDeck() {
  var d = [];
  for (var i = 0; i < SUITS.length; i++)
    for (var j = 0; j < RANKS.length; j++) d.push(String(RANKS[j]) + SUITS[i]);
  return d;
}
function rk(c) { return parseInt(c, 10); }
function st(c) { return c.charAt(c.length - 1); }
function power(c) {
  var s = st(c), r = rk(c);
  if (r === 1 && s === 'e') return 14;
  if (r === 1 && s === 'b') return 13;
  if (r === 7 && s === 'e') return 12;
  if (r === 7 && s === 'o') return 11;
  return { 3: 10, 2: 9, 1: 8, 12: 7, 11: 6, 10: 5, 7: 4, 6: 3, 5: 2, 4: 1 }[r];
}
function ev(c) { var r = rk(c); return r <= 7 ? r : 0; }
function envidoOf(h) {
  var b = 0, i, j;
  for (i = 0; i < h.length; i++) {
    b = Math.max(b, ev(h[i]));
    for (j = i + 1; j < h.length; j++)
      if (st(h[i]) === st(h[j])) b = Math.max(b, 20 + ev(h[i]) + ev(h[j]));
  }
  return b;
}
function isFlor(h) { return h && h.length === 3 && st(h[0]) === st(h[1]) && st(h[1]) === st(h[2]); }
function florOf(h) { return 20 + ev(h[0]) + ev(h[1]) + ev(h[2]); }
function clone(o) { return JSON.parse(JSON.stringify(o)); }
function other(t) { return t === 'A' ? 'B' : 'A'; }
function emptyHandFields(mano) {
  return {
    mano: mano, dealt: false, handOver: false,
    hands: {}, initHands: {}, folded: {}, trick: 0,
    leader: mano, turn: mano,
    played: { t0: {}, t1: {}, t2: {} },
    results: [],
    env: { chain: [], waitTeam: null, done: false },
    tru: { val: 1, offerVal: null, offBy: null, waitTeam: null, lastRaiser: null, heldWait: null },
    flor: { decl: {}, state: null, lvl: 0, by: null, raiser: null, waitTeam: null }
  };
}
function newGame(config, names) {
  var n = config.players;
  var seats = [];
  for (var i = 0; i < n; i++) seats.push({ name: names[i] || ('Jugador ' + (i + 1)), team: i % 2 === 0 ? 'A' : 'B' });
  var g = { v: 1, config: config, n: n, seats: seats, target: config.target, scores: { A: 0, B: 0 }, status: 'playing', winner: null, handNum: 0, log: [] };

document.querySelector('[data-v="2"]').style=activeStyle;
function showCreate(){ document.getElementById('join-box').style.display='none'; document.getElementById('create-box').style.display='flex'; }
function showJoin(){ document.getElementById('create-box').style.display='none'; document.getElementById('join-box').style.display='flex'; }
document.querySelectorAll('.players-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.players-btn').forEach(x=>{ x.style=''; x.classList.remove('active-choice'); });
    b.style=activeStyle; b.classList.add('active-choice');
    chosenPlayers=parseInt(b.dataset.v);
  });
});

document.getElementById('cr-btn').onclick = createRoom;
document.getElementById('jo-btn').onclick = joinRoom;

async function createRoom(){
  const name = document.getElementById('cr-name').value.trim();
  if(!name){ setErr('cr-err','Ingresá tu nombre'); return; }
  myPlayerId = uid();
  roomCode = code4();
  isHost = true;
  const config = {
    players: chosenPlayers,
    target: parseInt(document.getElementById('cr-target').value),
    canta: document.getElementById('cr-canta').value,
    flor: document.getElementById('cr-flor').checked,
    chat: document.getElementById('cr-chat').checked
  };
  chatLocked = !config.chat;
  roomRef = db.ref('mesas/'+roomCode);
  const snap = await roomRef.once('value');
  if(snap.exists()){ setErr('cr-err','Ese código ya existe, intentá de nuevo'); createRoom(); return; }
  const playerData = { name, seat: 0, team:'A', online: true };
  await roomRef.set({
    config,
    status: 'waiting',
    host: myPlayerId,
    players: { [myPlayerId]: playerData }
  });
  mySeatIndex = 0;
  myTeam = 'A';
  subscribeRoom();
  showWaitingRoom();
}

async function joinRoom(){
  const name = document.getElementById('jo-name').value.trim();
  const code = document.getElementById('jo-code').value.trim().toUpperCase();
  if(!name){ setErr('jo-err','Ingresá tu nombre'); return; }
  if(!code||code.length<4){ setErr('jo-err','Código inválido'); return; }
  myPlayerId = uid();
  roomCode = code;
  roomRef = db.ref('mesas/'+roomCode);
  const snap = await roomRef.once('value');
  if(!snap.exists()){ setErr('jo-err','Mesa no encontrada'); return; }
  const data = snap.val();
  if(data.status === 'playing'){ setErr('jo-err','La partida ya empezó'); return; }
  const players = data.players||{};
  const seats = Object.values(players).map(p=>p.seat);
  const maxSeat = data.config.players - 1;
  let nextSeat = 0;
  while(seats.includes(nextSeat) && nextSeat <= maxSeat) nextSeat++;
  if(nextSeat > maxSeat){ setErr('jo-err','Mesa llena'); return; }
  const team = nextSeat%2===0?'A':'B';
  mySeatIndex = nextSeat;
  myTeam = team;
  chatLocked = !data.config.chat;
  await roomRef.child('players/'+myPlayerId).set({ name, seat: nextSeat, team, online:true });
  isHost = data.host === myPlayerId;
  subscribeRoom();
  showWaitingRoom();
}

function subscribeRoom(){
  gameRef = roomRef.child('game');
  chatRef = roomRef.child('chat');
  playersRef = roomRef.child('players');

  playersRef.on('value', snap=>{
    currentPlayers = snap.val()||{};
    updateWaitingRoom();
  });

  gameRef.on('value', snap=>{
    const g = snap.val();
    if(!g) return;
    currentGame = T.norm(g);
    if(currentGame.status==='playing'||currentGame.dealt||currentGame.handOver){
      showGame();
      renderGame();
    }
  });

  roomRef.child('status').on('value', snap=>{
    if(snap.val()==='playing') showGame();
  });

  chatRef && chatRef.limitToLast(60).on('value', snap=>{
    renderChat(snap.val());
  });
}

function showWaitingRoom(){
  document.getElementById('lobby').style.display='none';
  document.getElementById('waiting-room').style.display='flex';
  document.getElementById('room-code').textContent = roomCode;
}
function showGame(){
  document.getElementById('waiting-room').style.display='none';
  document.getElementById('game').style.display='flex';
  document.getElementById('game').style.flexDirection='column';
  if(currentGame && currentGame.config.chat){
    document.getElementById('chat-toggle').style.display='flex';
    document.getElementById('chat-lock-icon').textContent = currentGame.config.chat ? '' : '🔒';
  }
}

function updateWaitingRoom(){
  if(!currentPlayers) return;
  const config = currentGame ? currentGame.config : null;
  let cfg = null;
  roomRef.child('config').once('value',s=>{ cfg=s.val(); renderWR(cfg); });
}
function renderWR(cfg){
  if(!cfg||!currentPlayers) return;
  const n = cfg.players;
  const seats = new Array(n).fill(null);
  Object.entries(currentPlayers).forEach(([id,p])=>{ if(p.seat<n) seats[p.seat]=p; });
  const grid = document.getElementById('wr-players');
  grid.innerHTML = '';
  for(let i=0;i<n;i++){
    const p = seats[i];
    const team = i%2===0?'A':'B';
    const div = document.createElement('div');
    div.className = 'player-slot'+(p?(' filled'+(p.seat===mySeatIndex?' mine':'')):'');
    if(p){
      div.innerHTML = `<div class="avatar">${team==='A'?'🔵':'🔴'}</div><div class="pname">${p.name}${p.seat===mySeatIndex?' (vos)':''}</div><div class="pteam ${team==='A'?'team-a':'team-b'}">Equipo ${team==='A'?'1':'2'}</div>`;
    } else {
      div.innerHTML = `<div class="avatar" style="opacity:.3">${team==='A'?'🔵':'🔴'}</div><div class="slot-empty">Esperando…</div><div class="pteam ${team==='A'?'team-a':'team-b'}">Equipo ${team==='A'?'1':'2'}</div>`;
    }
    grid.appendChild(div);
  }
  const filled = Object.values(currentPlayers).filter(p=>p.seat<n).length;
  document.getElementById('wr-config').textContent =
    `${n} jugadores · ${cfg.target} puntos · Flor: ${cfg.flor?'Sí':'No'} · Envido: ${cfg.canta==='pie'?'Solo el pie':'Cualquiera'} · Chat: ${cfg.chat?'💬 Abierto':'🔒 Cerrado'}`;
  const startBtn = document.getElementById('start-btn');
  const wrMsg = document.getElementById('wr-waiting-msg');
  if(isHost){
    if(filled===n){ startBtn.style.display='block'; wrMsg.textContent='¡Mesa completa! Podés empezar.'; }
    else{ startBtn.style.display='none'; wrMsg.textContent=`Faltan ${n-filled} jugador(es)…`; }
  } else {
    startBtn.style.display='none';
    wrMsg.textContent = filled===n ? 'Esperando que el host empiece…' : `Faltan ${n-filled} jugador(es)…`;
  }
  document.getElementById('start-btn').onclick = startGame;
}

async function startGame(){
  // Construir juego inicial con los nombres
  const cfgSnap = await roomRef.child('config').once('value');
  const cfg = cfgSnap.val();
  const pSnap = await roomRef.child('players').once('value');
  const players = pSnap.val();
  const names = new Array(cfg.players).fill('?');
  Object.values(players).forEach(p=>{ if(p.seat<cfg.players) names[p.seat]=p.name; });
  const g = T.newGame(cfg, names);
  // Repartir
  const deck = shuffleDeck();
  const dealt = T.apply(g, {type:'DEAL', deck});
  await gameRef.set(dealt);
  await roomRef.child('status').set('playing');
}

function shuffleDeck(){
  const d = T.makeDeck();
  for(let i=d.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [d[i],d[j]]=[d[j],d[i]];
  }
  return d;
}

function leaveRoom(){
  if(roomRef && myPlayerId) roomRef.child('players/'+myPlayerId+'/online').set(false);
  roomRef && roomRef.off();
  gameRef && gameRef.off();
  chatRef && chatRef.off();
  playersRef && playersRef.off();
  location.reload();
}

// ───────────────────────────────────────────────
// RENDER DEL JUEGO
// ───────────────────────────────────────────────
function seatIdxToUid(seat){
  if(!currentPlayers) return null;
  for(const [id,p] of Object.entries(currentPlayers)) if(p.seat===seat) return id;
  return null;
}
function seatName(seat){
  if(!currentGame) return 'J'+(seat+1);
  return currentGame.seats[seat]?currentGame.seats[seat].name:'J'+(seat+1);
}

function renderGame(){
  const g = currentGame;
  if(!g) return;
  const n = g.n;
  const target = g.target;

  // Scores
  document.getElementById('score-a-val').textContent = g.scores.A;
  document.getElementById('score-b-val').textContent = g.scores.B;
  document.getElementById('score-a-name').textContent = 'Eq. 1';
  document.getElementById('score-b-name').textContent = 'Eq. 2';
  document.getElementById('bar-a').style.width = Math.min(100,g.scores.A/target*100)+'%';
  document.getElementById('bar-b').style.width = Math.min(100,g.scores.B/target*100)+'%';
  document.getElementById('g-target-lbl').textContent = 'a '+target;
  document.getElementById('g-hand-info').textContent = 'Mano '+(g.handNum+1)+' · es mano: '+seatName(g.mano);

  // Status banner
  const banner = document.getElementById('status-banner');
  banner.textContent = T.waitingText(g);
  const isMyTurn = !T.anyWait(g) && g.turn===mySeatIndex && !g.handOver && g.dealt;
  const hasWait = T.anyWait(g) && (
    (g.env.waitTeam && g.env.waitTeam===myTeam) ||
    (g.tru.waitTeam && g.tru.waitTeam===myTeam) ||
    (g.flor.waitTeam && g.flor.waitTeam===myTeam)
  );
  if(isMyTurn||hasWait){ banner.style.borderColor='var(--green)'; banner.style.color='var(--green)'; }
  else{ banner.style.borderColor='var(--border)'; banner.style.color='var(--text)'; }

  // Armar asientos relativos: yo al fondo, rivales arriba, compas al costado
  // orden visual: rivales (fila top) | centro | compañeros + mi mano
  const allies = [], rivals = [];
  for(let i=0;i<n;i++){
    if(i===mySeatIndex) continue;
    if(T.teamOf(g,i)===myTeam) allies.push(i);
    else rivals.push(i);
  }

  // RIVALES
  const rivalsRow = document.getElementById('rivals-row');
  rivalsRow.innerHTML = '';
  rivals.forEach(s=>{
    const isFolded = !!g.folded['s'+s];
    const hand = g.hands['s'+s]||[];
    const isTurn = g.turn===s && !T.anyWait(g) && !g.handOver && g.dealt;
    const div = document.createElement('div');
    div.className = 'player-area';
    let cardsHtml = hand.map(()=>faceDownHTML('small-rival')).join('');
    // cartas jugadas en bazas actuales
    let playedHtml = '';
    for(let t=0;t<=g.trick;t++){
      const c = g.played['t'+t]&&g.played['t'+t]['s'+s];
      if(c) playedHtml += cardHTML(c,'played-on-table');
    }
    div.innerHTML = `
      <div class="pname-small">${isTurn?'<span class="turn-indicator"></span>':''}${seatName(s)}${isFolded?'<span class="fold-badge">mazo</span>':''}</div>
      <div class="hand">${cardsHtml}</div>
      <div style="display:flex;gap:3px;margin-top:2px">${playedHtml}</div>`;
    rivalsRow.appendChild(div);
  });

  // BAZAS CENTRALES (cartas jugadas por todos en la baza actual)
  const bazasArea = document.getElementById('bazas-area');
  bazasArea.innerHTML = '';
  // Mostrar resultado de bazas anteriores + la actual
  for(let t=0;t<=Math.min(g.trick,2);t++){
    const res = g.results[t];
    const pile = document.createElement('div');
    pile.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:2px;';
    const label = document.createElement('div');
    label.style.cssText = 'font-size:.6rem;color:var(--muted);';
    label.textContent = t<g.trick ? (res==='P'?'Parda':res==='A'?'Eq.1':'Eq.2') : 'Baza '+(t+1);
    pile.appendChild(label);
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:2px;';
    // todas las cartas de esa baza
    const allSeats = T.activeSeats(g);
    for(let i=0;i<n;i++){
      const c = g.played['t'+t]&&g.played['t'+t]['s'+i];
      if(c) row.appendChild(createCardEl(c,'played-on-table'));
    }
    pile.appendChild(row);
    bazasArea.appendChild(pile);
  }

  // COMPAÑEROS (con cartas boca arriba — solo ves las de tu equipo)
  const alliesRow = document.getElementById('allies-row');
  alliesRow.innerHTML = '';
  allies.forEach(s=>{
    const isFolded = !!g.folded['s'+s];
    const hand = g.hands['s'+s]||[];
    const isTurn = g.turn===s && !T.anyWait(g) && !g.handOver && g.dealt;
    const div = document.createElement('div');
    div.className = 'player-area';
    let cardsHtml = hand.map(c=>cardHTML(c,'ally-mini')).join('');
    let playedHtml = '';
    for(let t=0;t<=g.trick;t++){
      const c = g.played['t'+t]&&g.played['t'+t]['s'+s];
      if(c) playedHtml += cardHTML(c,'played-on-table');
    }
    div.innerHTML = `
      <div class="pname-small">${isTurn?'<span class="turn-indicator"></span>':''}${seatName(s)}${isFolded?'<span class="fold-badge">mazo</span>':''}<br><small style="color:var(--green);font-size:.6rem">compañero</small></div>
      <div class="hand">${cardsHtml}</div>
      <div style="display:flex;gap:3px;margin-top:2px">${playedHtml}</div>`;
    alliesRow.appendChild(div);
  });

  // MI MANO
  const myLabel = document.getElementById('my-label');
  const myHand = document.getElementById('my-hand');
  const iAmFolded = !!g.folded['s'+mySeatIndex];
  const envidoVal = g.dealt ? T.envidoOf(g.initHands['s'+mySeatIndex]||[]) : 0;
  const florHand = g.dealt && T.isFlor(g.initHands['s'+mySeatIndex]||[]);
  myLabel.innerHTML = `Tu mano · Envido: <b style="color:var(--blue)">${g.dealt?envidoVal:'—'}</b>${florHand?` · <span style="color:var(--purple)">¡FLOR! 🌸</span>`:''}${iAmFolded?` · <span class="fold-badge" style="font-size:.8rem">fuiste al mazo</span>`:''}`;
  myHand.innerHTML = '';
  if(g.dealt && !iAmFolded){
    const myCards = g.hands['s'+mySeatIndex]||[];
    const canPlay = !T.anyWait(g) && g.turn===mySeatIndex && !g.handOver;
    myCards.forEach(c=>{
      const el = createCardEl(c, canPlay?'playable':'');
      if(canPlay) el.addEventListener('click',()=>doPlay(c));
      myHand.appendChild(el);
    });
    // cartas jugadas por mí
    for(let t=0;t<=g.trick;t++){
      const c = g.played['t'+t]&&g.played['t'+t]['s'+mySeatIndex];
      if(c){
        const el = createCardEl(c,'played-on-table');
        myHand.appendChild(el);
      }
    }
  }

  // ACCIONES
  renderActions(g);

  // LOG
  renderLog(g);

  // WIN OVERLAY
  if(g.status==='finished'){
    const ov = document.getElementById('win-overlay');
    ov.style.display='flex';
    const isWinner = g.winner===myTeam;
    document.getElementById('win-icon').textContent = isWinner?'🏆':'😔';
    const winName = g.winner==='A'?'Equipo 1':'Equipo 2';
    document.getElementById('win-title').textContent = isWinner?`¡Ganaste con ${winName}!`:`Ganó ${winName}`;
    document.getElementById('win-scores').textContent = g.scores.A+' — '+g.scores.B;
  } else {
    document.getElementById('win-overlay').style.display='none';
  }
}

function createCardEl(c, extra){
  const div = document.createElement('div');
  div.className = `card ${suitClass(c)} ${extra||''}`;
  div.innerHTML = `<div class="crank">${T.rk(c)}</div><div class="csuit">${T.SUIT_SYM[T.st(c)]}</div>`;
  return div;
}

function renderActions(g){
  const bar = document.getElementById('actions-bar');
  bar.innerHTML = '';
  if(!g.dealt && !g.handOver) return;
  const acts = T.actionsFor(g, mySeatIndex);
  if(acts.length===0){
    bar.innerHTML = '<span style="color:var(--muted);font-size:.85rem;padding:.5rem">Esperá tu turno…</span>';
    return;
  }
  acts.forEach(({action,label,style})=>{
    const btn = document.createElement('button');
    btn.className = 'act-btn '+style;
    btn.textContent = label;
    btn.addEventListener('click',()=>doAction(action));
    bar.appendChild(btn);
  });
}

function renderLog(g){
  if(!g.log) return;
  const logEl = document.getElementById('game-log');
  if(g.log.length===lastLogLen) return;
  lastLogLen = g.log.length;
  logEl.innerHTML = '';
  // mostrar últimas 15 entradas
  const entries = g.log.slice(-15);
  entries.forEach(e=>{
    const div = document.createElement('div');
    div.className = 'log-entry'+(e.s===-1?' highlight':'');
    const name = e.s===-1?'':seatName(e.s)+': ';
    div.textContent = name+e.x;
    logEl.appendChild(div);
  });
  logEl.scrollTop = logEl.scrollHeight;
}

// ───────────────────────────────────────────────
// ACCIONES → Firebase
// ───────────────────────────────────────────────
async function doAction(action){
  if(!currentGame||!gameRef) return;
  const next = T.apply(currentGame, action);
  if(!next){ console.warn('Acción inválida',action); return; }
  // Si la mano terminó y es NEXT, repartir también
  if(action.type==='NEXT'){
    const deck = shuffleDeck();
    const dealt = T.apply(next, {type:'DEAL', deck});
    await gameRef.set(dealt||next);
  } else {
    await gameRef.set(next);
  }
}
function doPlay(card){ doAction({type:'PLAY',seat:mySeatIndex,card}); }
function doReset(){
  document.getElementById('win-overlay').style.display='none';
  if(!currentGame||!gameRef) return;
  const next = T.apply(currentGame,{type:'RESET',seat:mySeatIndex});
  if(!next) return;
  const deck = shuffleDeck();
  const dealt = T.apply(next,{type:'DEAL',deck});
  gameRef.set(dealt||next);
}

// ───────────────────────────────────────────────
// CHAT
// ───────────────────────────────────────────────
function toggleChat(){
  chatOpen = !chatOpen;
  document.getElementById('chat-panel').classList.toggle('open',chatOpen);
  if(chatOpen){ chatUnread=0; updateChatBadge(); }
}
function updateChatBadge(){
  const badge = document.getElementById('chat-badge');
  badge.textContent = chatUnread;
  badge.style.display = chatUnread>0?'flex':'none';
}
function sendChat(){
  if(!chatRef||chatLocked) return;
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim();
  if(!txt) return;
  inp.value = '';
  const myName = currentGame&&currentGame.seats[mySeatIndex]?currentGame.seats[mySeatIndex].name:'Vos';
  chatRef.push({ name: myName, text: txt, t: Date.now() });
}
function renderChat(data){
  const container = document.getElementById('chat-msgs');
  container.innerHTML = '';
  if(!data) return;
  const msgs = Object.values(data).sort((a,b)=>a.t-b.t);
  msgs.forEach(m=>{
    const div = document.createElement('div');
    div.className = 'chat-msg';
    div.innerHTML = `<span class="cm-name">${m.name}: </span><span class="cm-text">${m.text}</span>`;
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
  if(!chatOpen){ chatUnread++; updateChatBadge(); }
}

// ───────────────────────────────────────────────
// UTILS
// ───────────────────────────────────────────────
function setErr(id,msg){ document.getElementById(id).textContent=msg; setTimeout(()=>document.getElementById(id).textContent='',3000); }
</script>
